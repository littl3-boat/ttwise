<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <rect width="900" height="700" fill="#0f172a" />
  <text x="450" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Diagnosis: Invisibility vs Low Demand</text>
  <rect x="80" y="120" width="740" height="120" rx="16" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
  <text x="450" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#e2e8f0">Step 1: Did You Get a Test Window?</text>
  <text x="450" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">Look for a short spike in unique viewers within first 5–15 minutes</text>
  <line x1="450" y1="240" x2="300" y2="320" stroke="#94a3b8" stroke-width="3" />
  <polygon points="300,320 314,316 308,304" fill="#94a3b8" />
  <line x1="450" y1="240" x2="600" y2="320" stroke="#94a3b8" stroke-width="3" />
  <polygon points="600,320 592,304 586,316" fill="#94a3b8" />
  <rect x="90" y="320" width="320" height="150" rx="16" fill="#1b2a45" stroke="#22c55e" stroke-width="2" />
  <text x="250" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#bbf7d0">Yes, Test Window</text>
  <text x="250" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#86efac">Now measure retention</text>
  <rect x="490" y="320" width="320" height="150" rx="16" fill="#2a1b28" stroke="#f97316" stroke-width="2" />
  <text x="650" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fed7aa">No Test Window</text>
  <text x="650" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">Likely invisibility</text>
  <rect x="80" y="520" width="740" height="120" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
  <text x="450" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#fff7ed">Step 2: If Test Window Exists</text>
  <text x="450" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#fed7aa">Low retention = low demand. Strong retention = packaging or timing issue.</text>
</svg>

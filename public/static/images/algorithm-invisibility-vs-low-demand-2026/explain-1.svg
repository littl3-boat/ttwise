  <text x="90" y="235" font-family="Arial, sans-serif" font-size="15" fill="#e2e8f0">• Audio + motion presence</text>
  <text x="90" y="265" font-family="Arial, sans-serif" font-size="15" fill="#e2e8f0">• Avoid empty screens</text>
  <text x="90" y="295" font-family="Arial, sans-serif" font-size="15" fill="#e2e8f0">• Fix stream stability</text>

  <text x="510" y="205" font-family="Arial, sans-serif" font-size="15" fill="#fef3c7">• Add interaction loops</text>
  <text x="510" y="235" font-family="Arial, sans-serif" font-size="15" fill="#fef3c7">• Pace every 2 minutes</text>
  <text x="510" y="265" font-family="Arial, sans-serif" font-size="15" fill="#fef3c7">• Segment the audience</text>
  <text x="510" y="295" font-family="Arial, sans-serif" font-size="15" fill="#fef3c7">• Test new formats weekly</text>

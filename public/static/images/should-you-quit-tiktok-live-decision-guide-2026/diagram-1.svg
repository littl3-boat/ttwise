<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00ffcc" />
    </marker>
  </defs>
  
  <rect width="800" height="800" fill="#1e1e1e"/>
  
  <text x="400" y="50" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">Should You Quit TikTok Live?</text>
  
  <!-- Root -->
  <g transform="translate(400, 120)">
    <rect x="-150" y="-30" width="300" height="60" rx="10" fill="#333" stroke="#fff" stroke-width="2"/>
    <text x="0" y="10" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Do you enjoy streaming?</text>
  </g>
  
  <!-- Branch 1 -->
  <line x1="400" y1="150" x2="200" y2="250" stroke="#fff" stroke-width="2"/>
  <line x1="400" y1="150" x2="600" y2="250" stroke="#fff" stroke-width="2"/>
  
  <!-- Node NO -->
  <g transform="translate(200, 250)">
    <rect x="-100" y="-25" width="200" height="50" rx="10" fill="#4d2a2a" stroke="#ff4d4d" stroke-width="2"/>
    <text x="0" y="5" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">NO (It's a chore)</text>
  </g>
  
  <!-- Result QUIT -->
  <line x1="200" y1="275" x2="200" y2="350" stroke="#ff4d4d" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(200, 380)">
    <rect x="-80" y="-30" width="160" height="60" rx="5" fill="#ff4d4d"/>
    <text x="0" y="10" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">QUIT NOW</text>
  </g>
  
  <!-- Node YES -->
  <g transform="translate(600, 250)">
    <rect x="-100" y="-25" width="200" height="50" rx="10" fill="#2a4d45" stroke="#00ffcc" stroke-width="2"/>
    <text x="0" y="5" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">YES (I love it)</text>
  </g>
  
  <!-- Branch 2 -->
  <line x1="600" y1="275" x2="600" y2="350" stroke="#fff" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Question 2 -->
  <g transform="translate(600, 380)">
    <rect x="-150" y="-30" width="300" height="60" rx="10" fill="#333" stroke="#fff" stroke-width="2"/>
    <text x="0" y="10" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Are you growing?</text>
  </g>
  
  <!-- Branch 3 -->
  <line x1="600" y1="410" x2="450" y2="500" stroke="#fff" stroke-width="2"/>
  <line x1="600" y1="410" x2="750" y2="500" stroke="#fff" stroke-width="2"/>
  
  <!-- Node NO -->
  <g transform="translate(450, 500)">
    <rect x="-80" y="-25" width="160" height="50" rx="10" fill="#333" stroke="#aaa" stroke-width="2"/>
    <text x="0" y="5" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">NO (Stuck)</text>
  </g>
  
  <!-- Result PIVOT -->
  <line x1="450" y1="525" x2="450" y2="600" stroke="#00ffcc" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(450, 630)">
    <rect x="-100" y="-30" width="200" height="60" rx="5" fill="#00ffcc"/>
    <text x="0" y="10" fill="#000" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">PIVOT CONTENT</text>
  </g>
  
  <!-- Node YES -->
  <g transform="translate(750, 500)">
    <rect x="-80" y="-25" width="160" height="50" rx="10" fill="#333" stroke="#aaa" stroke-width="2"/>
    <text x="0" y="5" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">YES (Slowly)</text>
  </g>
  
  <!-- Result KEEP GOING -->
  <line x1="750" y1="525" x2="750" y2="600" stroke="#00ffcc" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(750, 630)">
    <rect x="-100" y="-30" width="200" height="60" rx="5" fill="#2a4d45" stroke="#00ffcc" stroke-width="2"/>
    <text x="0" y="10" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">KEEP GOING</text>
  </g>
  
</svg>
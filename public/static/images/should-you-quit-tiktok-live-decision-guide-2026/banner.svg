<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#bg)"/>
  
  <!-- Left Side: The Burnout Zone -->
  <g transform="translate(100, 100)">
    <text x="200" y="50" fill="#ff4d4d" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">THE BURNOUT LOOP</text>
    
    <!-- Circle Loop -->
    <circle cx="200" cy="200" r="120" fill="none" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="10,10"/>
    
    <text x="200" y="150" fill="#aaa" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Go Live</text>
    <text x="200" y="200" fill="#aaa" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Hope for Algorithm</text>
    <text x="200" y="250" fill="#aaa" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Disappointment</text>
    
    <text x="200" y="380" fill="#ff4d4d" font-family="Arial, sans-serif" font-size="24" font-style="italic" text-anchor="middle">"Is it me?"</text>
  </g>
  
  <!-- Divider -->
  <line x1="600" y1="50" x2="600" y2="550" stroke="#444" stroke-width="2"/>
  
  <!-- Right Side: The Decision Path -->
  <g transform="translate(700, 100)">
    <text x="200" y="50" fill="#00ffcc" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">THE DECISION PATH</text>
    
    <!-- Paths -->
    <path d="M 50,300 L 200,300" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="125" y="290" fill="#fff" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Assessment</text>
    
    <!-- Fork -->
    <path d="M 200,300 L 350,200" stroke="#00ffcc" stroke-width="4"/>
    <path d="M 200,300 L 350,400" stroke="#ff4d4d" stroke-width="4"/>
    
    <rect x="330" y="170" width="120" height="60" rx="5" fill="#2a4d45" stroke="#00ffcc" stroke-width="2"/>
    <text x="390" y="205" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">PIVOT</text>
    
    <rect x="330" y="370" width="120" height="60" rx="5" fill="#4d2a2a" stroke="#ff4d4d" stroke-width="2"/>
    <text x="390" y="405" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">QUIT</text>
    
    <text x="200" y="480" fill="#00ffcc" font-family="Arial, sans-serif" font-size="24" font-style="italic" text-anchor="middle">Data > Emotion</text>
  </g>
  
</svg>
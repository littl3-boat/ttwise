<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1e1e1e"/>
  
  <text x="400" y="50" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Effort vs. Reward: The "Slot Machine" Effect</text>
  
  <!-- Axes -->
  <line x1="100" y1="400" x2="750" y2="400" stroke="#aaa" stroke-width="2"/>
  <line x1="100" y1="400" x2="100" y2="100" stroke="#aaa" stroke-width="2"/>
  
  <text x="400" y="440" fill="#aaa" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Effort / Time Invested</text>
  <text x="60" y="250" fill="#aaa" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" transform="rotate(-90, 60, 250)">Reward (Views)</text>
  
  <!-- TikTok Curve (High Variance) -->
  <path d="M 100,380 L 150,380 L 180,150 L 210,380 L 300,380 L 330,120 L 360,380 L 450,380 L 480,200 L 510,380 L 700,380" fill="none" stroke="#ff4d4d" stroke-width="3"/>
  <text x="500" y="180" fill="#ff4d4d" font-family="Arial, sans-serif" font-size="16" font-weight="bold">TikTok (Random Spikes)</text>
  
  <!-- Traditional Curve (Linear) -->
  <path d="M 100,380 L 700,200" fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="600" y="220" fill="#00ffcc" font-family="Arial, sans-serif" font-size="16" font-weight="bold">YouTube/Twitch (Compound)</text>
  
  <!-- Danger Zone Label -->
  <text x="400" y="300" fill="#aaa" font-family="Arial, sans-serif" font-size="14" font-style="italic" text-anchor="middle">"The Dopamine Trap"</text>
  
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!-- Background -->
  <rect width="1200" height="600" fill="#000000" />
  
  <!-- Gradient Overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#grad1)" />

  <!-- Main Title -->
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="56" fill="#ffffff">
    THE FORMAT BARRIER
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#ff4444">
    Why Video Fans Don't Watch Lives
  </text>

  <!-- Visual Metaphor: The Wall -->
  <!-- Video Side -->
  <g transform="translate(200, 380)">
    <rect x="0" y="0" width="100" height="150" rx="10" fill="#333333" stroke="#666666" stroke-width="2" />
    <text x="50" y="80" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#ffffff">15s</text>
    <text x="50" y="110" text-anchor="middle" font-family="Arial" font-size="14" fill="#aaaaaa">Dopamine</text>
  </g>

  <!-- The Barrier -->
  <line x1="600" y1="350" x2="600" y2="550" stroke="#ff4444" stroke-width="8" stroke-dasharray="20,10" />
  <text x="600" y="340" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#ff4444">INTENT GAP</text>

  <!-- Live Side -->
  <g transform="translate(900, 380)">
    <rect x="0" y="0" width="100" height="150" rx="10" fill="#333333" stroke="#fe2c55" stroke-width="2" />
    <text x="50" y="80" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#ffffff">1hr</text>
    <text x="50" y="110" text-anchor="middle" font-family="Arial" font-size="14" fill="#aaaaaa">Connection</text>
  </g>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <rect width="900" height="700" fill="#111111" />
  
  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="28" fill="#ffffff">The Audience Intent Venn Diagram</text>

  <!-- Left Circle: Video Fans -->
  <circle cx="300" cy="350" r="250" fill="#00f2ea" opacity="0.3" stroke="#00f2ea" stroke-width="2" />
  <text x="250" y="300" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#00f2ea">VIDEO FANS</text>
  <text x="250" y="330" text-anchor="middle" font-family="Arial" font-size="16" fill="#ccffff">Short Attention Span</text>
  <text x="250" y="350" text-anchor="middle" font-family="Arial" font-size="16" fill="#ccffff">Passive Consumption</text>
  <text x="250" y="370" text-anchor="middle" font-family="Arial" font-size="16" fill="#ccffff">Dopamine Seekers</text>
  <text x="250" y="420" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#ffffff">99%</text>

  <!-- Right Circle: Live Viewers -->
  <circle cx="600" cy="350" r="250" fill="#ff0050" opacity="0.3" stroke="#ff0050" stroke-width="2" />
  <text x="650" y="300" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#ff0050">LIVE VIEWERS</text>
  <text x="650" y="330" text-anchor="middle" font-family="Arial" font-size="16" fill="#ffcccc">Long Attention Span</text>
  <text x="650" y="350" text-anchor="middle" font-family="Arial" font-size="16" fill="#ffcccc">Active Participation</text>
  <text x="650" y="370" text-anchor="middle" font-family="Arial" font-size="16" fill="#ffcccc">Connection Seekers</text>
  <text x="650" y="420" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#ffffff">?</text>

  <!-- Intersection: The "True Fans" -->
  <path d="M450 180 Q520 350 450 520 Q380 350 450 180 Z" fill="#ffffff" opacity="0.2" />
  <text x="450" y="350" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#ffffff">THE 1%</text>
  <text x="450" y="380" text-anchor="middle" font-family="Arial" font-size="14" fill="#dddddd">"Format Crossers"</text>

  <!-- Arrow Pointing to Intersection -->
  <line x1="450" y1="600" x2="450" y2="530" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
  <text x="450" y="630" text-anchor="middle" font-family="Arial" font-size="16" fill="#aaaaaa">Your Goal: Identify These People</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
    </marker>
  </defs>
</svg>
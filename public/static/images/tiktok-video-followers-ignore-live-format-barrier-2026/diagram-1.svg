<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#1e1e1e"/>
  
  <text x="400" y="50" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">The Intent Mismatch Funnel</text>
  
  <!-- Funnel -->
  <path d="M 100,100 L 700,100 L 500,500 L 300,500 Z" fill="#2d2d2d" stroke="#aaa" stroke-width="2"/>
  
  <!-- Top Layer -->
  <text x="400" y="150" fill="#00f2ea" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">100,000 Followers</text>
  <text x="400" y="180" fill="#aaa" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Why they followed: "Funny 10s Clip"</text>
  
  <!-- Barrier -->
  <line x1="200" y1="250" x2="600" y2="250" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="10,5"/>
  <text x="400" y="240" fill="#ff4d4d" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">FORMAT BARRIER (They don't watch Lives)</text>
  
  <!-- Middle Layer -->
  <text x="400" y="300" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">5,000 Live-Aware</text>
  <text x="400" y="330" fill="#aaa" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Actually click on Live bubbles</text>
  
  <!-- Bottom Layer -->
  <text x="400" y="450" fill="#ff0050" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">50 Viewers</text>
  <text x="400" y="480" fill="#aaa" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">The Actual Audience</text>
  
  <text x="400" y="550" fill="#aaa" font-family="Arial, sans-serif" font-size="16" font-style="italic" text-anchor="middle">A follower is not a viewer.</text>
  
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1e1e1e"/>
  
  <text x="400" y="50" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">How to Bridge the Gap</text>
  
  <!-- Left: The Video -->
  <g transform="translate(100, 150)">
    <rect width="250" height="300" rx="10" fill="#2d2d2d" stroke="#00f2ea" stroke-width="2"/>
    <text x="125" y="40" fill="#00f2ea" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">The Hook Video</text>
    <text x="125" y="80" fill="#aaa" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Post 30m before Live</text>
    
    <text x="125" y="150" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">"I'm doing X right now"</text>
    <text x="125" y="180" fill="#aaa" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Creates Urgency</text>
    
    <rect x="50" y="220" width="150" height="40" rx="20" fill="#ff0050"/>
    <text x="125" y="245" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">LIVE Bubble</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 370,300 L 430,300" stroke="#fff" stroke-width="4" marker-end="url(#arrow)"/>
  
  <!-- Right: The Live -->
  <g transform="translate(450, 150)">
    <rect width="250" height="300" rx="10" fill="#2d2d2d" stroke="#ff0050" stroke-width="2"/>
    <text x="125" y="40" fill="#ff0050" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">The Payoff</text>
    <text x="125" y="80" fill="#aaa" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Must match video hook</text>
    
    <text x="125" y="150" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Doing X (Live)</text>
    <text x="125" y="180" fill="#aaa" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Delivers Promise</text>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#fff" />
    </marker>
  </defs>
  
</svg>
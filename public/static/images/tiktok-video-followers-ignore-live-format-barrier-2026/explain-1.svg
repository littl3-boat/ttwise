<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#111111" />
  
  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="28" fill="#ffffff">The Live Hook Strategy</text>

  <!-- Left: Bad Hook -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="300" height="350" rx="10" fill="#221111" stroke="#ff4444" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#ff4444">GENERIC NOTIFICATION</text>
    
    <!-- Phone Screen Mockup -->
    <rect x="50" y="70" width="200" height="200" fill="#333333" />
    <text x="150" y="150" text-anchor="middle" font-family="Arial" font-size="16" fill="#aaaaaa">"I'm Live! Join up!"</text>
    <text x="150" y="180" text-anchor="middle" font-family="Arial" font-size="16" fill="#aaaaaa">🔴 LIVE</text>

    <text x="150" y="320" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="#ff4444">Result: SCROLL PAST 📉</text>
  </g>

  <!-- Right: Good Hook -->
  <g transform="translate(500, 100)">
    <rect x="0" y="0" width="300" height="350" rx="10" fill="#112211" stroke="#44ff44" stroke-width="2" />
    <text x="150" y="40" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#44ff44">VALUE CLIFFHANGER</text>
    
    <!-- Phone Screen Mockup -->
    <rect x="50" y="70" width="200" height="200" fill="#333333" />
    <text x="150" y="130" text-anchor="middle" font-family="Arial" font-size="16" fill="#ffffff">"We just hit 99 wins..."</text>
    <text x="150" y="160" text-anchor="middle" font-family="Arial" font-size="16" fill="#44ff44">"Attempting #100 NOW"</text>
    <text x="150" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#aaaaaa">Link in bio / Live</text>

    <text x="150" y="320" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="#44ff44">Result: CLICK THROUGH 📈</text>
  </g>

</svg>
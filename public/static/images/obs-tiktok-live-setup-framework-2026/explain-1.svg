<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1e1e1e"/>
  
  <text x="400" y="50" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">The Bitrate vs. Quality Reality (Mobile)</text>
  
  <!-- Axes -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#aaa" stroke-width="2"/>
  <line x1="100" y1="400" x2="100" y2="100" stroke="#aaa" stroke-width="2"/>
  
  <text x="400" y="440" fill="#aaa" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Bitrate (kbps)</text>
  <text x="60" y="250" fill="#aaa" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" transform="rotate(-90, 60, 250)">Perceived Quality</text>
  
  <!-- Curve -->
  <path d="M 100,400 Q 300,150 700,130" fill="none" stroke="#00ffcc" stroke-width="4"/>
  
  <!-- Points -->
  <circle cx="250" cy="240" r="6" fill="#ff4d4d"/>
  <text x="250" y="270" fill="#ff4d4d" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">2500 kbps<br/>(Pixelated)</text>
  
  <circle cx="450" cy="145" r="6" fill="#ffff00"/>
  <text x="450" y="180" fill="#ffff00" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">6000 kbps<br/>(Sweet Spot)</text>
  
  <circle cx="650" cy="132" r="6" fill="#aaa"/>
  <text x="650" y="165" fill="#aaa" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">8000+ kbps<br/>(Diminishing Returns)</text>
  
  <!-- Danger Zone -->
  <rect x="600" y="100" width="150" height="300" fill="#ff4d4d" fill-opacity="0.1"/>
  <text x="675" y="120" fill="#ff4d4d" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">BUFFERING RISK</text>
  
</svg>
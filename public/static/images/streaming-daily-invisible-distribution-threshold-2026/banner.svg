<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!-- Background -->
  <rect width="1200" height="600" fill="#0d0d0d" />
  
  <!-- Gradient Overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#grad1)" />

  <!-- Main Title -->
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="56" fill="#ffffff">
    STREAMING DAILY
  </text>
  <text x="600" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="56" fill="#666666">
    BUT STILL INVISIBLE?
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#ff4444">
    The "Distribution Threshold" Reality
  </text>

  <!-- Visual Elements -->
  <!-- Left: Calendar (Consistency) -->
  <g transform="translate(200, 150)">
    <rect x="0" y="0" width="120" height="140" rx="10" fill="#333333" />
    <text x="60" y="30" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="#ffffff">DAILY</text>
    <!-- Checkmarks -->
    <text x="30" y="60" text-anchor="middle" font-size="20" fill="#44ff44">✓</text>
    <text x="60" y="60" text-anchor="middle" font-size="20" fill="#44ff44">✓</text>
    <text x="90" y="60" text-anchor="middle" font-size="20" fill="#44ff44">✓</text>
    <text x="30" y="90" text-anchor="middle" font-size="20" fill="#44ff44">✓</text>
    <text x="60" y="90" text-anchor="middle" font-size="20" fill="#44ff44">✓</text>
    <text x="90" y="90" text-anchor="middle" font-size="20" fill="#44ff44">✓</text>
    <text x="30" y="120" text-anchor="middle" font-size="20" fill="#44ff44">✓</text>
    <text x="60" y="120" text-anchor="middle" font-size="20" fill="#44ff44">✓</text>
    <text x="90" y="120" text-anchor="middle" font-size="20" fill="#44ff44">✓</text>
  </g>

  <!-- Right: Eye (Visibility) -->
  <g transform="translate(880, 150)">
    <path d="M0,70 Q60,0 120,70 Q60,140 0,70 Z" fill="none" stroke="#666666" stroke-width="4" />
    <circle cx="60" cy="70" r="25" fill="#333333" />
    <text x="60" y="160" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#666666">0 VIEWERS</text>
  </g>

  <!-- Arrow -->
  <line x1="350" y1="220" x2="850" y2="220" stroke="#ff4444" stroke-width="3" stroke-dasharray="10,5" marker-end="url(#arrowhead)" />
  <text x="600" y="200" text-anchor="middle" font-family="Arial" font-size="18" fill="#ff4444">EFFORT ≠ REACH</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4444" />
    </marker>
  </defs>
</svg>
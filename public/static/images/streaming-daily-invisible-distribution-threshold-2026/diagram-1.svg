<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <rect width="900" height="700" fill="#111111" />
  
  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="28" fill="#ffffff">The Distribution Threshold Funnel</text>

  <!-- Phase 1: Baseline -->
  <g transform="translate(200, 100)">
    <rect x="0" y="0" width="500" height="100" fill="#222222" stroke="#444444" rx="5" />
    <text x="250" y="40" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#aaaaaa">PHASE 1: BASELINE</text>
    <text x="250" y="70" text-anchor="middle" font-family="Arial" font-size="16" fill="#888888">Observation Pool (0-5 Viewers)</text>
  </g>

  <!-- Arrow Down -->
  <path d="M450 200 L450 240" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Phase 2: Test Window -->
  <g transform="translate(200, 250)">
    <rect x="0" y="0" width="500" height="120" fill="#332200" stroke="#ffaa00" stroke-width="2" rx="5" />
    <text x="250" y="30" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#ffaa00">PHASE 2: TEST WINDOW</text>
    <text x="250" y="60" text-anchor="middle" font-family="Arial" font-size="16" fill="#cccccc">Short Push (6-20 Viewers)</text>
    <text x="250" y="90" text-anchor="middle" font-family="Arial" font-style="italic" font-size="14" fill="#ffcc88">Signals: Retention? Clicks? Chat?</text>
  </g>

  <!-- Split Paths -->
  <!-- Fail Path -->
  <path d="M300 370 L250 450" stroke="#ff4444" stroke-width="3" marker-end="url(#arrow-red)" />
  <g transform="translate(100, 460)">
    <rect x="0" y="0" width="300" height="100" fill="#220000" stroke="#ff4444" rx="5" />
    <text x="150" y="40" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="18" fill="#ff4444">FAIL: RETURN TO BASELINE</text>
    <text x="150" y="70" text-anchor="middle" font-family="Arial" font-size="14" fill="#ffaaaa">"Invisible Again"</text>
  </g>

  <!-- Success Path -->
  <path d="M600 370 L650 450" stroke="#44ff44" stroke-width="3" marker-end="url(#arrow-green)" />
  <g transform="translate(500, 460)">
    <rect x="0" y="0" width="300" height="100" fill="#002200" stroke="#44ff44" rx="5" />
    <text x="150" y="40" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="18" fill="#44ff44">PASS: DISTRIBUTION LIFT</text>
    <text x="150" y="70" text-anchor="middle" font-family="Arial" font-size="14" fill="#ccffcc">Reach New Audiences</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4444" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44ff44" />
    </marker>
  </defs>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#111111" />
  
  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="28" fill="#ffffff">The Daily Stream Trap</text>

  <!-- Left: The Trap -->
  <g transform="translate(100, 100)">
    <text x="150" y="30" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#ff4444">BAD SIGNAL</text>
    <!-- Graph -->
    <line x1="50" y1="300" x2="300" y2="300" stroke="#666666" stroke-width="2" />
    <line x1="50" y1="300" x2="50" y2="100" stroke="#666666" stroke-width="2" />
    
    <!-- Flatline Data -->
    <path d="M50 280 L100 280 L100 285 L150 285 L150 280 L200 280 L200 285 L250 285" stroke="#ff4444" stroke-width="3" fill="none" />
    
    <text x="175" y="330" text-anchor="middle" font-family="Arial" font-size="14" fill="#aaaaaa">7 Days of Low Retention</text>
    <text x="175" y="350" text-anchor="middle" font-family="Arial" font-style="italic" font-size="14" fill="#ffaaaa">"Algorithm learns you are boring"</text>
  </g>

  <!-- Right: The Fix -->
  <g transform="translate(500, 100)">
    <text x="150" y="30" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#44ff44">GOOD SIGNAL</text>
    <!-- Graph -->
    <line x1="50" y1="300" x2="300" y2="300" stroke="#666666" stroke-width="2" />
    <line x1="50" y1="300" x2="50" y2="100" stroke="#666666" stroke-width="2" />
    
    <!-- Spiked Data -->
    <path d="M50 280 L100 280 L100 150 L150 150 L150 280 L200 280" stroke="#44ff44" stroke-width="3" fill="none" />
    
    <text x="175" y="330" text-anchor="middle" font-family="Arial" font-size="14" fill="#aaaaaa">1 Event Stream / Week</text>
    <text x="175" y="350" text-anchor="middle" font-family="Arial" font-style="italic" font-size="14" fill="#ccffcc">"Algorithm sees high retention"</text>
  </g>

  <!-- Arrow -->
  <path d="M420 200 L480 200" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
    </marker>
  </defs>
</svg>
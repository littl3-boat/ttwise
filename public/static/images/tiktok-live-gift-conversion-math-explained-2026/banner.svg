<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#bg)"/>
  
  <!-- Left: The Viewer's Cost -->
  <g transform="translate(150, 100)">
    <text x="200" y="50" fill="#fff" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle">VIEWER PAYS</text>
    
    <!-- Big Coin -->
    <circle cx="200" cy="200" r="100" fill="#ffd700" stroke="#b8860b" stroke-width="4"/>
    <text x="200" y="190" fill="#b8860b" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle">$100</text>
    <text x="200" y="240" fill="#b8860b" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">Coins</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 450,200 L 550,200" stroke="#666" stroke-width="4" marker-end="url(#arrow)"/>
  
  <!-- Middle: The Funnel -->
  <g transform="translate(600, 100)">
    <text x="0" y="50" fill="#ff4d4d" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">The Shrinkage</text>
    
    <!-- Funnel Shape -->
    <path d="M -50,100 L 50,100 L 25,300 L -25,300 Z" fill="#333" stroke="#666" stroke-width="2"/>
    
    <!-- Drops -->
    <text x="100" y="150" fill="#ff4d4d" font-family="Arial, sans-serif" font-size="18">-30% Apple Tax</text>
    <text x="100" y="200" fill="#ff4d4d" font-family="Arial, sans-serif" font-size="18">-50% TikTok Cut</text>
  </g>
  
  <!-- Right: The Creator's Payout -->
  <g transform="translate(850, 100)">
    <text x="150" y="50" fill="#00ffcc" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle">YOU GET</text>
    
    <!-- Small Diamond -->
    <path d="M 150,120 L 220,200 L 150,280 L 80,200 Z" fill="#00ffcc" stroke="#00997a" stroke-width="4"/>
    <text x="150" y="215" fill="#00332a" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle">$35</text>
    
    <text x="150" y="350" fill="#aaa" font-family="Arial, sans-serif" font-size="20" font-style="italic" text-anchor="middle">"Where did it go?"</text>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666" />
    </marker>
  </defs>
  
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#bg)"/>
  
  <!-- Left Side: Twitch Speed -->
  <g transform="translate(100, 100)">
    <text x="250" y="50" fill="#9146FF" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle">TWITCH</text>
    <text x="250" y="90" fill="#aaa" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Low Latency Protocol</text>
    
    <!-- Fast Path -->
    <path d="M 50,200 L 450,200" stroke="#9146FF" stroke-width="8" stroke-dasharray="20,10"/>
    <circle cx="450" cy="200" r="10" fill="#9146FF"/>
    
    <text x="250" y="250" fill="#fff" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle">2-4s</text>
    <text x="250" y="300" fill="#aaa" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">Near Real-Time</text>
  </g>
  
  <!-- Divider -->
  <line x1="600" y1="50" x2="600" y2="550" stroke="#444" stroke-width="2" stroke-dasharray="10,10"/>
  
  <!-- Right Side: TikTok Stability -->
  <g transform="translate(700, 100)">
    <text x="250" y="50" fill="#00f2ea" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle">TIKTOK LIVE</text>
    <text x="250" y="90" fill="#aaa" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Mobile Stability Buffer</text>
    
    <!-- Buffered Path -->
    <path d="M 50,200 L 150,200 L 150,150 L 250,150 L 250,250 L 350,250 L 350,200 L 450,200" stroke="#ff0050" stroke-width="8" fill="none"/>
    <circle cx="450" cy="200" r="10" fill="#ff0050"/>
    
    <text x="250" y="250" fill="#fff" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle">6-10s</text>
    <text x="250" y="300" fill="#aaa" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">Buffered for Mobile</text>
  </g>
  
  <text x="600" y="550" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-style="italic" text-anchor="middle">Speed vs. Reach</text>
  
</svg>
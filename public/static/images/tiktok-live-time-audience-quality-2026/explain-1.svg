<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#111827" />
  
  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="28" fill="#ffffff">Matching Strategy to Time</text>

  <!-- Left: The Net -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="320" height="350" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
    <text x="160" y="40" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#fbbf24">"THE NET"</text>
    <text x="160" y="70" text-anchor="middle" font-family="Arial" font-size="16" fill="#fbbf24">Daytime Strategy</text>

    <!-- Content Items -->
    <text x="30" y="120" font-family="Arial" font-size="16" fill="#cbd5e1">✅ Visual Hooks</text>
    <text x="30" y="150" font-family="Arial" font-size="16" fill="#cbd5e1">✅ Fast Pacing</text>
    <text x="30" y="180" font-family="Arial" font-size="16" fill="#cbd5e1">✅ No Audio Needed</text>
    
    <text x="30" y="240" font-family="Arial" font-size="16" fill="#94a3b8">❌ Deep Stories</text>
    <text x="30" y="270" font-family="Arial" font-size="16" fill="#94a3b8">❌ Q&A Sessions</text>

    <text x="160" y="320" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="#ffffff">Goal: New Followers</text>
  </g>

  <!-- Right: The Harvester -->
  <g transform="translate(480, 100)">
    <rect x="0" y="0" width="320" height="350" rx="10" fill="#1e293b" stroke="#818cf8" stroke-width="2" />
    <text x="160" y="40" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#818cf8">"THE HARVESTER"</text>
    <text x="160" y="70" text-anchor="middle" font-family="Arial" font-size="16" fill="#818cf8">Nighttime Strategy</text>

    <!-- Content Items -->
    <text x="30" y="120" font-family="Arial" font-size="16" fill="#cbd5e1">✅ Community Games</text>
    <text x="30" y="150" font-family="Arial" font-size="16" fill="#cbd5e1">✅ Deep Chatting</text>
    <text x="30" y="180" font-family="Arial" font-size="16" fill="#cbd5e1">✅ Audio Heavy</text>
    
    <text x="30" y="240" font-family="Arial" font-size="16" fill="#94a3b8">❌ Silent Gameplay</text>
    <text x="30" y="270" font-family="Arial" font-size="16" fill="#94a3b8">❌ Repetitive Loops</text>

    <text x="160" y="320" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="#ffffff">Goal: Subs & Gifts</text>
  </g>

</svg>
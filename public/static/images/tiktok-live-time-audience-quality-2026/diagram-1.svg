<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <rect width="900" height="700" fill="#0f172a" />
  <g font-family="Arial, sans-serif" fill="#e2e8f0">
    <text x="450" y="60" font-size="30" font-weight="700" text-anchor="middle">The Timing Quality Curve</text>
    <rect x="80" y="120" width="740" height="90" rx="14" fill="#111827" stroke="#38bdf8" stroke-width="3" />
    <text x="450" y="160" font-size="18" font-weight="600" text-anchor="middle">Off-Peak: Smaller rooms, higher intent</text>
    <rect x="80" y="250" width="740" height="90" rx="14" fill="#1f2937" stroke="#f59e0b" stroke-width="3" />
    <text x="450" y="290" font-size="18" font-weight="600" text-anchor="middle">Peak: Larger rooms, lower intent</text>
    <rect x="80" y="380" width="740" height="90" rx="14" fill="#1f2937" stroke="#22c55e" stroke-width="3" />
    <text x="450" y="420" font-size="18" font-weight="600" text-anchor="middle">Sweet Spot: Mid-peak windows</text>
    <text x="450" y="445" font-size="14" text-anchor="middle" fill="#94a3b8">Enough volume, still engaged</text>
    <path d="M450 210 L450 250" stroke="#94a3b8" stroke-width="2" />
    <path d="M450 340 L450 380" stroke="#94a3b8" stroke-width="2" />
    <text x="450" y="520" font-size="14" text-anchor="middle" fill="#94a3b8">Audience quality changes by intent, not just time.</text>
  </g>
</svg>

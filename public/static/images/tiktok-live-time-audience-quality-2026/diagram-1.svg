<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <rect width="900" height="700" fill="#111827" />
  
  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="28" fill="#ffffff">The Audience Quality Spectrum</text>

  <!-- Y-Axis Labels -->
  <text x="50" y="150" text-anchor="start" font-family="Arial" font-weight="bold" font-size="16" fill="#fbbf24">TRANSIT MODE</text>
  <text x="50" y="550" text-anchor="start" font-family="Arial" font-weight="bold" font-size="16" fill="#818cf8">DESTINATION MODE</text>

  <!-- Spectrum Bar -->
  <defs>
    <linearGradient id="gradBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="200" y="100" width="50" height="500" rx="25" fill="url(#gradBar)" />

  <!-- Annotation Left: Transit -->
  <g transform="translate(280, 150)">
    <text x="0" y="0" font-family="Arial" font-weight="bold" font-size="20" fill="#fbbf24">High Volume / Low Intent</text>
    <text x="0" y="30" font-family="Arial" font-size="16" fill="#cbd5e1">- Commuting / Waiting</text>
    <text x="0" y="55" font-family="Arial" font-size="16" fill="#cbd5e1">- Sound OFF</text>
    <text x="0" y="80" font-family="Arial" font-size="16" fill="#cbd5e1">- Quick Scrolls</text>
  </g>

  <!-- Annotation Right: Destination -->
  <g transform="translate(280, 500)">
    <text x="0" y="0" font-family="Arial" font-weight="bold" font-size="20" fill="#818cf8">Low Volume / High Intent</text>
    <text x="0" y="30" font-family="Arial" font-size="16" fill="#cbd5e1">- Relaxing / Bedtime</text>
    <text x="0" y="55" font-family="Arial" font-size="16" fill="#cbd5e1">- Sound ON</text>
    <text x="0" y="80" font-family="Arial" font-size="16" fill="#cbd5e1">- Willing to Chat</text>
  </g>

  <!-- Time Labels -->
  <text x="150" y="155" text-anchor="end" font-family="Arial" font-size="14" fill="#9ca3af">8:00 AM</text>
  <text x="150" y="355" text-anchor="end" font-family="Arial" font-size="14" fill="#9ca3af">3:00 PM</text>
  <text x="150" y="555" text-anchor="end" font-family="Arial" font-size="14" fill="#9ca3af">9:00 PM</text>

</svg>
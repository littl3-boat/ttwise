<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!-- Background -->
  <rect width="1200" height="600" fill="#0f172a" />
  
  <!-- Gradient Overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#grad1)" />

  <!-- Main Title -->
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="56" fill="#ffffff">
    TIME vs. QUALITY
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#94a3b8">
    When You Stream Changes Who You Get
  </text>

  <!-- Split Visual -->
  <!-- Left: Day/Transit -->
  <g transform="translate(200, 380)">
    <circle cx="0" cy="0" r="60" fill="#fbbf24" opacity="0.8" /> <!-- Sun -->
    <text x="0" y="90" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#fbbf24">TRANSIT</text>
    <text x="0" y="120" text-anchor="middle" font-family="Arial" font-size="18" fill="#cbd5e1">Scrollers</text>
  </g>

  <!-- Divider -->
  <line x1="600" y1="350" x2="600" y2="550" stroke="#475569" stroke-width="2" stroke-dasharray="10,5" />

  <!-- Right: Night/Destination -->
  <g transform="translate(1000, 380)">
    <circle cx="0" cy="0" r="60" fill="#818cf8" opacity="0.8" /> <!-- Moon -->
    <text x="0" y="90" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#818cf8">DESTINATION</text>
    <text x="0" y="120" text-anchor="middle" font-family="Arial" font-size="18" fill="#cbd5e1">Watchers</text>
  </g>

</svg>